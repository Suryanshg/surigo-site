name: Deploy Frontend to GitHub Pages

# Trigger this on push to main
on:
  push:
    branches:
      - main 

# Declare permissions
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25

      # Steps into your frontend directory to install and build
      - name: Install and Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      # Uploads the 'dist' folder that Vite generated inside frontend
      - name: Upload Build Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: './frontend/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4