<!DOCTYPE html>
<html lang="en">
<head>
    <!-- <link rel="stylesheet" href="/src/style.css"> -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suryansh Goyal | Personal Website</title>
</head>
<body>

    <header>
        <nav>
            <strong>Surigo Site</strong>
        </nav>
    </header>

    <main>
        <!-- Hero Section -->
        <section id="hero">
            <h1>Suryansh Goyal</h1>
            <p>Software Engineer. Problem Solver. Student.</p>
        </section>

        <!-- Chatbot Interface Section -->
        <section id="chat-section">
            <h2>Chat with my AI Clone</h2>
            
            <!-- Where the conversation will appear -->
            <div id="chat-box" style="border: 1px solid #ccc; height: 200px; overflow-y: scroll; padding: 10px; margin-bottom: 10px;">
                <p><em>AI: Ask me anything about Suryansh's experience!</em></p>
            </div>

            <!-- Form for user input -->
            <form id="chat-form">
                <input type="text" id="user-input" placeholder="Type a message..." required>
                <button type="submit" id="send-btn">Send</button>
            </form>
        </section>
    </main>

    <!-- Connects to a JavaScript logic file -->
    <script type="module" src="src/main.js"></script>
</body>
</html>
