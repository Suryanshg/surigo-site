    <!-- Chatbot Interface Section -->
    <button id="chat-toggle-btn">Chat with SurigoBot</button>
    <div id="chat-sidebar" class="hidden">
        <div class="chat-header">
            <h2>SurigoBot</h2>
            <button id="chat-close-btn">&times;</button> <!-- &times; displays 'x' (multiplicative sign) -->
        </div>
        
        <!-- Where the conversation will appear -->
        <div id="chat-box">
            <p><em>SurigoBot: Ask me anything about Suryansh Goyal :)</em></p>
        </div>

        <!-- Form for user input -->
        <form id="chat-form">
            <input type="text" id="user-input" placeholder="Type a message..." required>
            <button type="submit" id="send-btn">Send</button>
        </form>
    </div>
